name: Candidate submission
description: Propose a DataForge candidate for public smoke review or trusted replay.
title: "Candidate: <short method name>"
labels: ["candidate", "submission"]
body:
  - type: markdown
    attributes:
      value: |
        Local smoke scores are not official frontier claims. Use this form to document a candidate artifact for review or trusted replay.
  - type: input
    id: commit
    attributes:
      label: Commit
      description: Commit SHA or branch containing only editable-path changes.
      placeholder: "abc1234"
    validations:
      required: true
  - type: dropdown
    id: status
    attributes:
      label: Requested status
      options:
        - candidate
        - verified replay request
        - replicated replay request
        - scaling audit request
    validations:
      required: true
  - type: checkboxes
    id: editable_paths
    attributes:
      label: Editable-path confirmation
      options:
        - label: I changed only `solution/filter.py`, `solution/rank_documents.py`, `solution/dedup.py`, `solution/curriculum.py`, or `configs/submission.json`.
          required: true
        - label: I did not edit `harness/**`, `baselines/**`, `data/**`, `verifier/**`, `verifier_data/**`, `challenge.json`, `score.json`, or `leaderboard/**`.
          required: true
        - label: I read `verifier/task-spec.json` and understand that public smoke data is candidate-only.
          required: true
  - type: textarea
    id: method
    attributes:
      label: Method summary
      description: Describe the filtering, ranking, deduplication, or curriculum idea.
    validations:
      required: true
  - type: textarea
    id: smoke
    attributes:
      label: Public smoke output
      description: Paste the JSON output from `scripts/run_smoke.sh`.
      render: json
    validations:
      required: true
  - type: textarea
    id: preflight
    attributes:
      label: Preflight output
      description: Paste output from `python3 scripts/check_submission.py --manifest submission.json --base origin/main` and `python3 scripts/validate_local_bundle.py --manifest submission.json --base origin/main`.
      render: json
    validations:
      required: true
  - type: textarea
    id: search_accounting
    attributes:
      label: Search and agent accounting
      description: List seeds, selection trials, agent runs, failed variants, and local hardware.
    validations:
      required: true
  - type: textarea
    id: agent_notes
    attributes:
      label: Agent notes or ablation log
      description: Paste `python3 scripts/validate_agent_notes.py --input agent-notes.json` output, or explain why no agent-run notes were used.
    validations:
      required: true
  - type: textarea
    id: search_ledger
    attributes:
      label: Search ledger
      description: Paste `python3 scripts/validate_search_ledger.py --input search-ledger.json` output, or explain why there was only one manual attempt.
    validations:
      required: true
  - type: textarea
    id: replay_result
    attributes:
      label: Trusted replay evidence
      description: For verified or later requests, paste `python3 scripts/validate_replay_result.py --input replay-result.json` output. For candidate-only issues, write `candidate only`.
    validations:
      required: true
  - type: textarea
    id: promotion_packet
    attributes:
      label: Promotion packet evidence
      description: For promoted or later requests, paste `python3 scripts/validate_promotion_packet.py --input promotion-packet.json` output. For candidate-only issues, write `candidate only`.
    validations:
      required: true
  - type: textarea
    id: failure_modes
    attributes:
      label: Expected failure modes
      description: Name cases where the curation rule may overfit, regress, or fail to scale.
    validations:
      required: true
